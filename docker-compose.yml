services:
  deepface:
    image: ${R}deepface:0.0.100-dt
    build: .
    container_name: deepface
    ports:
      - "5005:5000" # Assuming deepface runs on port 5000
    environment:
      - CUDA_VISIBLE_DEVICES=-1 # disable gpu
      - DEEPFACE_CONNECTION_DETAILS
      - DEEPFACE_DATABASE_TYPE
      - DEEPFACE_FACE_DETECTION_MODELS
      - DEEPFACE_FACE_RECOGNITION_MODELS
    depends_on:
      - pgvector
    volumes:
      - deepface:/root/.deepface

  pgvector:
    image: pgvector/pgvector:0.8.3-pg18-trixie
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deepface
      POSTGRES_USER: deepface_user
      POSTGRES_PASSWORD: deepface_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/pgvector-init:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
  deepface:
